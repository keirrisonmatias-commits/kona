<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#b2ff59"></stop>
      <stop offset="100%" stop-color="#00e676"></stop>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"></rect>

  <!-- Sol -->
  <circle cx="700" cy="80" r="50" fill="#ffeb3b"></circle>

  <!-- Casa -->
  <rect x="300" y="180" width="200" height="150" fill="#ffffff" rx="10"></rect>
  <polygon points="300,180 400,100 500,180" fill="#2e7d32"></polygon>

  <!-- Porta -->
  <rect x="385" y="250" width="30" height="80" fill="#795548"></rect>

  <!-- Gota de água -->
  <path d="M150 120 C130 160,130 190,150 210 C170 190,170 160,150 120 Z" fill="#2196f3"></path>

  <!-- Folha -->
  <path d="M600 250 C650 200,700 250,650 300 C600 320,580 270,600 250 Z" fill="#2e7d32"></path>

  <!-- Texto -->
  <text x="400" y="60" font-size="28" text-anchor="middle" fill="#1b5e20" font-family="Arial">
    Missão Sustentável 🌱
  </text>

  <text x="400" y="360" font-size="18" text-anchor="middle" fill="#1b5e20">
    Economize água 💧 e energia ⚡
  </text>
</svg>